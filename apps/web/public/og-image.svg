<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="sun" cx="15%" cy="20%" r="70%">
      <stop offset="0%" stop-color="#ffc93f" stop-opacity="0.45"/>
      <stop offset="60%" stop-color="#ffc93f" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="sun2" cx="88%" cy="8%" r="55%">
      <stop offset="0%" stop-color="#ffc93f" stop-opacity="0.25"/>
      <stop offset="65%" stop-color="#ffc93f" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="#fdfdfa"/>
  <rect width="1200" height="630" fill="url(#sun)"/>
  <rect width="1200" height="630" fill="url(#sun2)"/>

  <!-- logo chip -->
  <g transform="translate(90 90)">
    <rect width="72" height="72" rx="10" fill="#ffc93f"/>
    <g fill="none" stroke="#1a1400" stroke-width="6" stroke-linecap="square">
      <path d="M24 20 L12 36 L24 52"/>
      <path d="M48 20 L60 36 L48 52"/>
      <path d="M44 14 L28 58"/>
    </g>
  </g>

  <text x="185" y="140" font-family="'Fraunces', Georgia, serif" font-size="40" font-weight="500" fill="#141411" letter-spacing="-0.5">
    code<tspan fill="#5a584f" font-style="italic">/</tspan>uncode
  </text>

  <!-- headline -->
  <g transform="translate(90 260)">
    <text font-family="'Fraunces', Georgia, serif" font-size="78" font-weight="500" fill="#141411" letter-spacing="-1.4">
      <tspan x="0" dy="0">We design, build</tspan>
      <tspan x="0" dy="92">and maintain</tspan>
      <tspan x="0" dy="92" font-style="italic" fill="#141411">
        <tspan>modern websites.</tspan>
      </tspan>
    </text>
    <!-- highlighter bar under italic -->
    <rect x="0" y="246" width="640" height="22" fill="#ffc93f" opacity="0.9"/>
  </g>

  <!-- footer line -->
  <g transform="translate(90 560)">
    <text font-family="'JetBrains Mono', monospace" font-size="20" fill="#5a584f" letter-spacing="3">
      CODEUNCODE.COM  ·  STUDIO FROM BENGALURU
    </text>
  </g>
</svg>
